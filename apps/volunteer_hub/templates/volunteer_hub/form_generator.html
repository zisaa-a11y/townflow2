<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenAPI POST Form Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --fg-bg: #f6f8fb;
            --fg-card: #ffffff;
            --fg-border: #dbe2ee;
            --fg-text: #0f172a;
            --fg-muted: #5b6474;
            --fg-accent: #0d6efd;
        }

        body {
            background:
                radial-gradient(ellipse at top right, rgba(13, 110, 253, 0.08), transparent 58%),
                radial-gradient(ellipse at bottom left, rgba(25, 135, 84, 0.08), transparent 54%),
                var(--fg-bg);
            color: var(--fg-text);
            min-height: 100vh;
        }

        .page-wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 2rem 1rem 3rem;
        }

        .hero {
            background: linear-gradient(120deg, #ffffff, #f1f5fc);
            border: 1px solid var(--fg-border);
            border-radius: 1rem;
            padding: 1.2rem 1.4rem;
            box-shadow: 0 12px 30px rgba(17, 24, 39, 0.06);
            margin-bottom: 1.25rem;
        }

        .endpoint-card {
            border: 1px solid var(--fg-border);
            border-radius: 0.9rem;
            box-shadow: 0 8px 20px rgba(17, 24, 39, 0.05);
            background: var(--fg-card);
            animation: riseIn .35s ease both;
        }

        @keyframes riseIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .path-pill {
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .form-mode-wrap,
        .json-mode-wrap {
            transition: opacity .2s ease;
        }

        .json-editor {
            min-height: 220px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.9rem;
        }

        .response-box {
            background: #0b1220;
            color: #d7e3ff;
            border-radius: 0.65rem;
            padding: 0.85rem;
            font-size: 0.86rem;
            white-space: pre-wrap;
            max-height: 360px;
            overflow: auto;
        }

        .nested-fieldset {
            border: 1px dashed #ced6e3;
            border-radius: 0.6rem;
            padding: 0.8rem;
        }

        .nested-legend {
            font-size: 0.88rem;
            color: #475569;
            padding: 0 0.3rem;
            width: auto;
            margin-bottom: 0.4rem;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <section class="hero">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div>
                <h1 class="h4 mb-1">OpenAPI POST Form Generator</h1>
                <p class="text-secondary mb-0">Automatically generated from <span class="fw-semibold">{{ schema_url }}</span>. No endpoint or field hardcoding.</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <label for="auth-token" class="form-label mb-0 small text-secondary">Bearer Token</label>
                <input id="auth-token" class="form-control form-control-sm" type="password" placeholder="Optional">
            </div>
        </div>
    </section>

    <div id="global-alert" class="alert d-none" role="alert"></div>
    <div id="post-endpoints-container" class="vstack gap-3"></div>
</div>

<script>
    window.__VOLUNTEER_HUB_SCHEMA_URL = "{{ schema_url|escapejs }}";
</script>
<script type="module">
{{ form_generator_js|safe }}
</script>
</body>
</html>
