services:
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TESSDATA_PREFIX: /usr/share/tesseract-ocr/5/tessdata
    command: >
      sh -c "python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS} --threads ${GUNICORN_THREADS} --timeout ${GUNICORN_TIMEOUT} --forwarded-allow-ips='*'"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "${DJANGO_EXTERNAL_PORT}:8000"
    depends_on:
      - redis

volumes:
  static_volume:
  media_volume:
